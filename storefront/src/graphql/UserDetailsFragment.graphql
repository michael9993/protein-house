fragment UserDetails on User {
	id
	email
	firstName
	lastName
	dateJoined
	avatar {
		url
		alt
	}
	metadata {
		key
		value
	}
	addresses {
		id
		firstName
		lastName
		companyName
		streetAddress1
		streetAddress2
		city
		postalCode
		country {
			code
			country
		}
		countryArea
		phone
		isDefaultShippingAddress
		isDefaultBillingAddress
	}
}
