# Fetch top-level categories for homepage display
# Create categories in: Dashboard > Catalog > Categories
# Add background images for visual appeal

query CategoriesForHomepage($channel: String!, $first: Int = 8, $languageCode: LanguageCodeEnum!) {
  categories(first: $first, level: 0) {
    edges {
      node {
        id
        name
        translation(languageCode: $languageCode) { name description }
        slug
        description
        backgroundImage {
          url
          alt
        }
        products(channel: $channel, first: 12) {
          totalCount
          edges {
            node {
              id
              name
              translation(languageCode: $languageCode) { name }
              slug
              thumbnail {
                url
                alt
              }
              media {
                url
                alt
              }
            }
          }
        }
        children(first: 50) {
          edges {
            node {
              id
              name
              translation(languageCode: $languageCode) { name }
              slug
              backgroundImage {
                url
                alt
              }
              products(channel: $channel, first: 12) {
                totalCount
                edges {
                  node {
                    id
                    name
                    translation(languageCode: $languageCode) { name }
                    thumbnail {
                      url
                      alt
                    }
                    media {
                      url
                      alt
                    }
                  }
                }
              }
              children(first: 20) {
                edges {
                  node {
                    id
                    slug
                    name
                    translation(languageCode: $languageCode) { name }
                  }
                }
              }
            }
          }
        }
        metadata {
          key
          value
        }
      }
    }
  }
}

