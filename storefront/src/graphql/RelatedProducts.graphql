# Query for fetching related products by category
# Used in the Related Products section on PDP
# Fetches 12 products to allow for filtering out the current product while still having enough

query RelatedProductsByCategory($categorySlug: String!, $channel: String!, $first: Int = 12) {
	category(slug: $categorySlug) {
		name
		products(first: $first, channel: $channel) {
			edges {
				node {
					...ProductListItem
				}
			}
		}
	}
}

# Fallback query for popular products when category has insufficient items
query PopularProducts($channel: String!, $first: Int = 12) {
	products(
		first: $first
		channel: $channel
		sortBy: { field: RATING, direction: DESC }
	) {
		edges {
			node {
				...ProductListItem
			}
		}
	}
}
