fragment OrderDetails on Order {
	id
	number
	created
	status
	paymentStatus
	metadata {
		key
		value
	}
	total {
		gross {
			amount
			currency
		}
	}
	subtotal {
		gross {
			amount
			currency
		}
	}
	shippingPrice {
		gross {
			amount
			currency
		}
	}
	shippingAddress {
		firstName
		lastName
		streetAddress1
		streetAddress2
		city
		postalCode
		country {
			code
			country
		}
		phone
	}
	billingAddress {
		firstName
		lastName
		streetAddress1
		streetAddress2
		city
		postalCode
		country {
			code
			country
		}
		phone
	}
	# Invoice data
	invoices {
		id
		number
		createdAt
		url
		status
	}
	# Fulfillment tracking
	fulfillments {
		id
		status
		created
		trackingNumber
		lines {
			id
			quantity
			orderLine {
				id
				productName
			}
		}
	}
	lines {
		id
		productName
		translatedProductName
		variantName
		translatedVariantName
		quantity
		unitPrice {
			gross {
				amount
				currency
			}
		}
		totalPrice {
			gross {
				amount
				currency
			}
		}
		thumbnail {
			url
			alt
		}
		variant {
			id
			name
			translation(languageCode: $languageCode) { name }
			product {
				id
				name
				translation(languageCode: $languageCode) { name description }
				description
				slug
				thumbnail {
					url
					alt
				}
				category {
					id
					name
					translation(languageCode: $languageCode) { name }
				}
			}
			pricing {
				price {
					gross {
						amount
						currency
					}
				}
			}
		}
	}
}
