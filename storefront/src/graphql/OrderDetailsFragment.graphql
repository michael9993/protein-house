fragment OrderDetails on Order {
	id
	number
	created
	status
	paymentStatus
	total {
		gross {
			amount
			currency
		}
	}
	subtotal {
		gross {
			amount
			currency
		}
	}
	shippingPrice {
		gross {
			amount
			currency
		}
	}
	shippingAddress {
		firstName
		lastName
		streetAddress1
		streetAddress2
		city
		postalCode
		country {
			code
			country
		}
		phone
	}
	billingAddress {
		firstName
		lastName
		streetAddress1
		streetAddress2
		city
		postalCode
		country {
			code
			country
		}
		phone
	}
	# Invoice data
	invoices {
		id
		number
		createdAt
		url
		status
	}
	# Fulfillment tracking
	fulfillments {
		id
		status
		created
		trackingNumber
		lines {
			id
			quantity
			orderLine {
				id
				productName
			}
		}
	}
	lines {
		id
		productName
		variantName
		quantity
		unitPrice {
			gross {
				amount
				currency
			}
		}
		totalPrice {
			gross {
				amount
				currency
			}
		}
		thumbnail {
			url
			alt
		}
		variant {
			id
			name
			product {
				id
				name
				description
				slug
				thumbnail {
					url
					alt
				}
				category {
					id
					name
				}
			}
			pricing {
				price {
					gross {
						amount
						currency
					}
				}
			}
		}
	}
}
