query ProductListByCategory($slug: String!, $channel: String!, $first: Int!, $languageCode: LanguageCodeEnum!) {
	category(slug: $slug) {
		name
		translation(languageCode: $languageCode) { name description seoTitle seoDescription }
		description
		seoDescription
		seoTitle
		products(first: $first, channel: $channel) {
			edges {
				node {
					...ProductListItem
				}
			}
		}
	}
}
