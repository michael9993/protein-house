# Fetch collections for the products page carousel
query CollectionsList($channel: String!, $first: Int = 20, $languageCode: LanguageCodeEnum!) {
  collections(channel: $channel, first: $first) {
    edges {
      node {
        id
        name
        translation(languageCode: $languageCode) { name description }
        slug
        description
        backgroundImage {
          url
          alt
        }
        products(first: 4) {
          totalCount
          edges {
            node {
              id
              name
              translation(languageCode: $languageCode) { name }
              slug
              thumbnail {
                url
                alt
              }
              media {
                url
                alt
              }
            }
          }
        }
      }
    }
  }
}

