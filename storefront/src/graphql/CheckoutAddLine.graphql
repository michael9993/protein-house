mutation CheckoutAddLine($id: ID!, $productVariantId: ID!, $languageCode: LanguageCodeEnum!) {
	checkoutLinesAdd(id: $id, lines: [{ quantity: 1, variantId: $productVariantId }]) {
		checkout {
			id
			lines {
				id
				quantity
				variant {
					name
					translation(languageCode: $languageCode) { name }
					product {
						name
						translation(languageCode: $languageCode) { name }
					}
				}
			}
		}
		errors {
			message
		}
	}
}
