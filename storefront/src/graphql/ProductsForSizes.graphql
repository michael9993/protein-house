query ProductsForSizes($channel: String!, $first: Int!, $languageCode: LanguageCodeEnum!) {
  products(first: $first, channel: $channel) {
    edges {
      cursor
      node {
        id
        name
        attributes {
          attribute {
            id
            name
            translation(languageCode: $languageCode) { name }
            slug
          }
          values {
            id
            name
            translation(languageCode: $languageCode) { name }
            slug
          }
        }
      }
    }
  }
}

