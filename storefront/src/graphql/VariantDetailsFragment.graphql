fragment VariantDetails on ProductVariant {
	id
	name
	quantityAvailable
	trackInventory
	quantityLimitPerCustomer
	attributes {
		attribute {
			id
			name
			slug
			inputType
		}
		values {
			id
			name
			slug
			value
		}
	}
	pricing {
		price {
			gross {
				currency
				amount
			}
		}
		priceUndiscounted {
			gross {
				currency
				amount
			}
		}
	}
}
