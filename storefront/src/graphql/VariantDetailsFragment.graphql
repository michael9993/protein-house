# Requires $languageCode: LanguageCodeEnum! in parent query
fragment VariantDetails on ProductVariant {
	id
	name
	translation(languageCode: $languageCode) { name }
	quantityAvailable
	trackInventory
	quantityLimitPerCustomer
	attributes {
		attribute {
			id
			name
			translation(languageCode: $languageCode) { name }
			slug
			inputType
		}
		values {
			id
			name
			translation(languageCode: $languageCode) { name }
			slug
			value
		}
	}
	pricing {
		price {
			gross {
				currency
				amount
			}
		}
		priceUndiscounted {
			gross {
				currency
				amount
			}
		}
	}
}
