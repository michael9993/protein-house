query CurrentUserAddresses {
	me {
		id
		email
		addresses {
			id
			firstName
			lastName
			streetAddress1
			streetAddress2
			city
			cityArea
			postalCode
			country {
				code
				country
			}
			countryArea
			phone
			isDefaultShippingAddress
			isDefaultBillingAddress
		}
		defaultShippingAddress {
			id
		}
		defaultBillingAddress {
			id
		}
	}
}

