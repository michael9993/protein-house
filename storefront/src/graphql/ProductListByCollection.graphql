query ProductListByCollection($slug: String!, $channel: String!, $languageCode: LanguageCodeEnum!) {
	collection(slug: $slug, channel: $channel) {
		id
		name
		translation(languageCode: $languageCode) { name description seoTitle seoDescription }
		slug
		description
		seoDescription
		seoTitle
		backgroundImage {
			url
			alt
		}
		metadata {
			key
			value
		}
		products(first: 100) {
			totalCount
			edges {
				node {
					...ProductListItem
				}
			}
		}
	}
}
