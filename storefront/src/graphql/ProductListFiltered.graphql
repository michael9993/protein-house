# Query to fetch products with filtering support
# Filters can include: categories, price range, availability
query ProductListFiltered(
	$first: Int
	$after: String
	$channel: String!
	$sortBy: ProductOrder
	$filter: ProductFilterInput
	$search: String
	$languageCode: LanguageCodeEnum!
) {
	products(
		first: $first
		after: $after
		channel: $channel
		sortBy: $sortBy
		filter: $filter
		search: $search
	) {
		totalCount
		edges {
			node {
				...ProductListItem
			}
			cursor
		}
		pageInfo {
			hasNextPage
			hasPreviousPage
			startCursor
			endCursor
		}
	}
}

# Query to fetch categories for the filter sidebar (depth: root → L1 → L2).
# Limits kept low to stay under Saleor query cost (max 50000).
query CategoriesForFilter($first: Int!, $channel: String!, $languageCode: LanguageCodeEnum!) {
	categories(first: $first, level: 0) {
		edges {
			node {
				id
				name
				translation(languageCode: $languageCode) { name }
				slug
				products(first: 1, channel: $channel) {
					totalCount
				}
				children(first: 10) {
					edges {
						node {
							id
							name
							translation(languageCode: $languageCode) { name }
							slug
							products(first: 1, channel: $channel) {
								totalCount
							}
							children(first: 6) {
								edges {
									node {
										id
										name
										translation(languageCode: $languageCode) { name }
										slug
									}
								}
							}
						}
					}
				}
			}
		}
	}
}

