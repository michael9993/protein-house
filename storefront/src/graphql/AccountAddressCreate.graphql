mutation AccountAddressCreate($address: AddressInput!, $type: AddressTypeEnum) {
  accountAddressCreate(type: $type, input: $address) {
    address {
      id
      firstName
      lastName
      companyName
      streetAddress1
      streetAddress2
      city
      cityArea
      postalCode
      country {
        code
        country
      }
      countryArea
      phone
      isDefaultShippingAddress
      isDefaultBillingAddress
    }
    errors {
      field
      message
      code
    }
  }
}
