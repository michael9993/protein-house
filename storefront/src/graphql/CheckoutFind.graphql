query CheckoutFind($id: ID!, $languageCode: LanguageCodeEnum!) {
	checkout(id: $id) {
		id
		email
		# User ownership data for isolation checks
		user {
			id
			email
		}
		# Channel for validation
		channel {
			slug
		}
		# Shipping address — needed for step auto-completion on back navigation
		shippingAddress {
			firstName
			lastName
			companyName
			streetAddress1
			streetAddress2
			city
			cityArea
			countryArea
			postalCode
			phone
			country {
				code
			}
		}
		# Delivery method — needed for step auto-completion on back navigation
		deliveryMethod {
			... on ShippingMethod {
				id
				name
				price {
					amount
					currency
				}
			}
		}
		shippingMethods {
			id
			name
			price {
				amount
				currency
			}
			minimumDeliveryDays
			maximumDeliveryDays
		}
		shippingPrice {
			gross {
				amount
				currency
			}
		}
		# Gift cards applied to checkout
		giftCards {
			id
			last4CodeChars
			currentBalance {
				amount
				currency
			}
		}
		lines {
			id
			quantity
			isGift
			totalPrice {
				gross {
					amount
					currency
				}
			}
			variant {
				product {
					id
					name
					slug
					translation(languageCode: $languageCode) {
						name
					}
					thumbnail {
						url
						alt
					}
					category {
						name
						translation(languageCode: $languageCode) {
							name
						}
					}
				}
				pricing {
					price {
						gross {
							amount
							currency
						}
					}
					priceUndiscounted {
						gross {
							amount
							currency
						}
					}
				}
				name
				id
				translation(languageCode: $languageCode) {
					name
				}
				quantityAvailable
				attributes {
					attribute {
						id
						name
						slug
						translation(languageCode: $languageCode) {
							name
						}
					}
					values {
						id
						name
						slug
						translation(languageCode: $languageCode) {
							name
						}
					}
				}
			}
		}
		totalPrice {
			gross {
				amount
				currency
			}
			tax {
				amount
				currency
			}
		}
		subtotalPrice {
			gross {
				amount
				currency
			}
		}
		voucherCode
		discount {
			amount
			currency
		}
		discountName
	}
}
