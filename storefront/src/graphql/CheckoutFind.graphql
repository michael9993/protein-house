query CheckoutFind($id: ID!) {
	checkout(id: $id) {
		id
		email
		# User ownership data for isolation checks
		user {
			id
			email
		}
		# Channel for validation
		channel {
			slug
		}
		lines {
			id
			quantity
			isGift
			totalPrice {
				gross {
					amount
					currency
				}
			}
			variant {
				product {
					id
					name
					slug
					thumbnail {
						url
						alt
					}
					category {
						name
					}
				}
				pricing {
					price {
						gross {
							amount
							currency
						}
					}
					priceUndiscounted {
						gross {
							amount
							currency
						}
					}
				}
				name
				id
				quantityAvailable
				attributes {
					attribute {
						id
						name
						slug
					}
					values {
						id
						name
						slug
					}
				}
			}
		}
		totalPrice {
			gross {
				amount
				currency
			}
		}
		subtotalPrice {
			gross {
				amount
				currency
			}
		}
		voucherCode
		discount {
			amount
			currency
		}
		discountName
	}
}
