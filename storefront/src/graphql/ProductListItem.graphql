# Product creation date (for "New" badge logic)
# Requires $languageCode: LanguageCodeEnum! in parent query
fragment ProductListItem on Product {
	id
	name
	translation(languageCode: $languageCode) {
		name
	}
	slug
	created
	pricing {
		priceRange {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
		priceRangeUndiscounted {
			start {
				gross {
					amount
					currency
				}
			}
			stop {
				gross {
					amount
					currency
				}
			}
		}
	}
	category {
		id
		name
		translation(languageCode: $languageCode) {
			name
		}
		slug
	}
	collections {
		id
		name
		translation(languageCode: $languageCode) {
			name
		}
		slug
	}
	thumbnail(size: 1024, format: WEBP) {
		url
		alt
	}
	media {
		url
		alt
	}
	attributes {
		attribute {
			id
			name
			translation(languageCode: $languageCode) {
				name
			}
			slug
		}
		values {
			id
			name
			translation(languageCode: $languageCode) {
				name
			}
			slug
			file {
				url
			}
		}
	}
	variants {
		id
		quantityAvailable
	}
	rating
	reviews {
		totalCount
	}
}
