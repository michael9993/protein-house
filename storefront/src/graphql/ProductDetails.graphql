query ProductDetails($slug: String!, $channel: String!, $languageCode: LanguageCodeEnum!) {
	product(slug: $slug, channel: $channel) {
		id
		name
		translation(languageCode: $languageCode) {
			name
			description
			seoTitle
			seoDescription
		}
		slug
		created
		description
		seoTitle
		seoDescription
		thumbnail(size: 1024, format: WEBP) {
			url
			alt
		}
		media {
			id
			url(size: 1024, format: WEBP)
			alt
			type
		}
		category {
			id
			name
			translation(languageCode: $languageCode) { name }
			slug
		}
		attributes {
			attribute {
				id
				name
				translation(languageCode: $languageCode) { name }
				slug
				inputType
			}
			values {
				id
				name
				translation(languageCode: $languageCode) { name }
				slug
				value
				richText
				plainText
				boolean
				date
				dateTime
				file {
					url
					contentType
				}
			}
		}
		productType {
			id
			hasVariants
			variantAttributes(variantSelection: VARIANT_SELECTION) {
				slug
			}
		}
		variants {
			...VariantDetails
		}
		pricing {
			priceRange {
				start {
					gross {
						amount
						currency
					}
				}
				stop {
					gross {
						amount
						currency
					}
				}
			}
			priceRangeUndiscounted {
				start {
					gross {
						amount
						currency
					}
				}
				stop {
					gross {
						amount
						currency
					}
				}
			}
		}
		metadata {
			key
			value
		}
		rating
		reviews {
			totalCount
		}
	}
}
