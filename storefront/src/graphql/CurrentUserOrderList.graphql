query CurrentUserOrderList($first: Int = 10, $after: String, $languageCode: LanguageCodeEnum!) {
	me {
		...UserDetails
		orders(first: $first, after: $after) {
			totalCount
			pageInfo {
				hasNextPage
				hasPreviousPage
				startCursor
				endCursor
			}
			edges {
				node {
					...OrderDetails
				}
			}
		}
	}
}
