# ========================================
# Cloudflare Named Tunnel Configuration
# ========================================
# Domain: pawzenpets.shop
#
# Prerequisites:
#   1. Install cloudflared: winget install Cloudflare.cloudflared
#   2. Authenticate: cloudflared tunnel login
#   3. Create tunnel: cloudflared tunnel create aura-platform
#   4. Copy the tunnel ID from the output and update this file
#   5. Create CNAME DNS records in Cloudflare Dashboard:
#      - shop.pawzenpets.shop   → <tunnel-id>.cfargotunnel.com (proxied)
#      - api.pawzenpets.shop    → <tunnel-id>.cfargotunnel.com (proxied)
#      - dash.pawzenpets.shop   → <tunnel-id>.cfargotunnel.com (proxied)
#      - stripe.pawzenpets.shop → <tunnel-id>.cfargotunnel.com (proxied)
#      - smtp.pawzenpets.shop   → <tunnel-id>.cfargotunnel.com (proxied)
#      - invoices.pawzenpets.shop → <tunnel-id>.cfargotunnel.com (proxied)
#      - control.pawzenpets.shop  → <tunnel-id>.cfargotunnel.com (proxied)
#      - newsletter.pawzenpets.shop → <tunnel-id>.cfargotunnel.com (proxied)
#      - analytics.pawzenpets.shop  → <tunnel-id>.cfargotunnel.com (proxied)
#      - bulk.pawzenpets.shop     → <tunnel-id>.cfargotunnel.com (proxied)
#      - studio.pawzenpets.shop   → <tunnel-id>.cfargotunnel.com (proxied)
#      - dropship.pawzenpets.shop → <tunnel-id>.cfargotunnel.com (proxied)
#      - tax.pawzenpets.shop      → <tunnel-id>.cfargotunnel.com (proxied)
#   6. Run: cloudflared tunnel --config infra/cloudflared-config.yml run
#
# Usage:
#   cloudflared tunnel --config infra/cloudflared-config.yml run
#
# Or via the platform CLI:
#   .\infra\platform.ps1 up -Mode selfhosted
# e3d8f3ef-a6eb-46bc-b8e3-26162dbba0af
# Replace with your tunnel name (from step 3)
tunnel: pawzen-platform

# Replace <TUNNEL_ID> with the UUID from `cloudflared tunnel create` output
# The credentials file is auto-created at this path during `cloudflared tunnel create`
credentials-file: C:\Users\micha\.cloudflared\9dfe4ba3-a2ee-4bd4-a648-22986cd7db97.json

ingress:
  # Storefront (Next.js) — primary customer-facing site
  - hostname: pawzenpets.shop
    service: http://localhost:3000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: true

  # Saleor GraphQL API
  - hostname: api.pawzenpets.shop
    service: http://localhost:8000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: true

  # Admin Dashboard (Vite preview server)
  - hostname: dash.pawzenpets.shop
    service: http://localhost:9000
    originRequest:
      connectTimeout: 30s
      noTLSVerify: true

  # Stripe Payment App
  - hostname: stripe.pawzenpets.shop
    service: http://localhost:3002

  # SMTP Email App
  - hostname: smtp.pawzenpets.shop
    service: http://localhost:3001

  # Invoice PDF App
  - hostname: invoices.pawzenpets.shop
    service: http://localhost:3003

  # Storefront Control (CMS) App
  - hostname: control.pawzenpets.shop
    service: http://localhost:3004

  # Newsletter App
  - hostname: newsletter.pawzenpets.shop
    service: http://localhost:3005

  # Sales Analytics App
  - hostname: analytics.pawzenpets.shop
    service: http://localhost:3006

  # Bulk Manager App
  - hostname: bulk.pawzenpets.shop
    service: http://localhost:3007

  # Image Studio App
  - hostname: studio.pawzenpets.shop
    service: http://localhost:3008

  # Dropship Orchestrator App
  - hostname: dropship.pawzenpets.shop
    service: http://localhost:3009

  # Tax Manager App
  - hostname: tax.pawzenpets.shop
    service: http://127.0.0.1:3010

  # Catch-all — return 404 for unmatched hostnames
  - service: http_status:404
