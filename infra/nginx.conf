# =============================================================================
# Aura Platform — Nginx Configuration (Host-Level Reverse Proxy)
# =============================================================================
# This runs on the HOST (Ubuntu), not in Docker.
# It reverse-proxies HTTPS traffic to Docker containers via mapped host ports.
#
# Setup:
#   1. Copy this to /etc/nginx/sites-available/aura-platform
#   2. ln -s /etc/nginx/sites-available/aura-platform /etc/nginx/sites-enabled/
#   3. Replace "yourdomain.com" with your actual domain
#   4. Run certbot to get SSL certs (see deployment guide)
#   5. nginx -t && systemctl reload nginx
#
# Domains:
#   shop.yourdomain.com       → Storefront (Next.js :3000)
#   api.yourdomain.com        → Saleor GraphQL API (:8000)
#   dashboard.yourdomain.com  → Admin Dashboard (Nginx SPA :9002)
#   apps.yourdomain.com       → Saleor Apps (path-based routing)
#
# Port Mapping (docker-compose.prod.yml ports):
#   Expose these in compose: saleor-api:8000, storefront:3000, dashboard:9002
#   Apps: stripe:3002, smtp:3001, invoices:3003, storefront-control:3004,
#         newsletter:3005, analytics:3006, bulk-manager:3007
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=graphql_limit:10m rate=5r/s;

# Upstreams
upstream saleor_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream storefront {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream dashboard {
    server 127.0.0.1:9002;
}

upstream stripe_app       { server 127.0.0.1:3002; }
upstream smtp_app         { server 127.0.0.1:3001; }
upstream invoices_app     { server 127.0.0.1:3003; }
upstream control_app      { server 127.0.0.1:3004; }
upstream newsletter_app   { server 127.0.0.1:3005; }
upstream analytics_app    { server 127.0.0.1:3006; }
upstream bulk_manager_app { server 127.0.0.1:3007; }

# =============================================================================
# HTTP → HTTPS redirect
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name shop.yourdomain.com api.yourdomain.com dashboard.yourdomain.com apps.yourdomain.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Storefront — shop.yourdomain.com → :3000
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shop.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/shop.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shop.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/shop.yourdomain.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://js.stripe.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://*.sentry.io https://*.ingest.sentry.io; frame-src https://js.stripe.com https://hooks.stripe.com;" always;

    access_log /var/log/nginx/storefront-access.log;
    error_log /var/log/nginx/storefront-error.log;

    # Next.js static assets (immutable cache)
    location /_next/static/ {
        proxy_pass http://storefront;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://storefront;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# =============================================================================
# Saleor API — api.yourdomain.com → :8000
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.yourdomain.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-src 'none';" always;

    access_log /var/log/nginx/saleor-api-access.log;
    error_log /var/log/nginx/saleor-api-error.log;

    client_max_body_size 50M;
    client_body_buffer_size 128k;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # GraphQL endpoint (rate-limited)
    location /graphql/ {
        limit_req zone=graphql_limit burst=10 nodelay;

        proxy_pass http://saleor_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # CORS
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, authorization-bearer" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Media files (served from Docker volume)
    location /media/ {
        alias /var/www/saleor/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files
    location /static/ {
        alias /var/www/saleor/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check
    location /health/ {
        access_log off;
        proxy_pass http://saleor_api;
        proxy_set_header Host $host;
    }

    # All other API requests
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://saleor_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# =============================================================================
# Dashboard — dashboard.yourdomain.com → :9002
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/dashboard.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/dashboard.yourdomain.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Optional: restrict Dashboard to specific IPs
    # allow 1.2.3.4;
    # deny all;

    access_log /var/log/nginx/dashboard-access.log;
    error_log /var/log/nginx/dashboard-error.log;

    # Dashboard container runs its own Nginx serving the SPA
    location / {
        proxy_pass http://dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Apps — apps.yourdomain.com → path-based routing to each app
# =============================================================================
# Apps run inside Dashboard iframes. Each gets a path prefix.
# Dashboard must be configured with APPS_TUNNEL_URL_KEYWORDS to allow these URLs.
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apps.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/apps.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apps.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/apps.yourdomain.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
