services:
  postgres:
    image: postgres:16-alpine
    container_name: saleor-postgres-dev
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Script to create additional database for Stripe app
      - ./scripts/init-stripe-database.sh:/docker-entrypoint-initdb.d/01-init-stripe-database.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saleor-network

  redis:
    image: redis:7-alpine
    container_name: saleor-redis-dev
    env_file:
      - .env
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - saleor-network

  saleor-api:
    # Use local Saleor code instead of Docker image
    build:
      context: ../saleor
      dockerfile: Dockerfile
    container_name: saleor-api-dev
    env_file:
      - .env
    # Use uvicorn (ASGI) instead of runserver (WSGI) to enable CORS handler
    # Port is set via environment variable SALEOR_API_PORT from .env
    command: sh -c "uvicorn saleor.asgi:application --host 0.0.0.0 --port $${SALEOR_API_PORT} --reload --lifespan off"
    # command: python /app/scripts/wait-for-db-and-migrate.py
    ports:
      - "${SALEOR_API_PORT}:${SALEOR_API_PORT}"
    volumes:
      # Mount only the source code (not entire /app to preserve installed packages)
      - ../saleor/saleor:/app/saleor
      - ../saleor/manage.py:/app/manage.py
      - saleor-media:/app/media
      # Mount custom plugins if they exist
      # Custom plugins go in saleor/plugins/custom/
      # - ../saleor/plugins/custom:/app/plugins/custom:ro
      # Mount migration scripts
      # - ./scripts/wait-for-db-and-migrate.sh:/app/scripts/wait-for-db-and-migrate.sh:ro
      # - ./scripts/wait-for-db-and-migrate.py:/app/scripts/wait-for-db-and-migrate.py:ro
    environment:
      # Core Settings - All values from .env file
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ALLOWED_CLIENT_HOSTS: ${ALLOWED_CLIENT_HOSTS}
      ALLOWED_GRAPHQL_ORIGINS: ${ALLOWED_GRAPHQL_ORIGINS}

      # Database - Constructed from .env values
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Enable connection pooling (60 seconds) to reuse connections and prevent exhaustion
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}

      # Redis
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}

      # Media Files
      MEDIA_ROOT: /app/media
      MEDIA_URL: /media/

      # Email
      EMAIL_URL: ${EMAIL_URL}

      # Webhooks
      WEBHOOK_SECRET_KEY: ${WEBHOOK_SECRET_KEY}
      # RSA key for JWS webhook signing; must match worker so app verification succeeds
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY:-}
      RSA_PRIVATE_PASSWORD: ${RSA_PRIVATE_PASSWORD:-}

      # Timezone
      TIME_ZONE: ${TIME_ZONE}

      # API Port (used by uvicorn command)
      SALEOR_API_PORT: ${SALEOR_API_PORT}

      # Public URL - Used for JWT token issuer URL (webhook signature verification).
      # When using tunnels, set SALEOR_API_TUNNEL_URL so PUBLIC_URL matches; otherwise apps return 401 SIGNATURE_VERIFICATION_FAILED.
      PUBLIC_URL: ${SALEOR_API_TUNNEL_URL:-${PUBLIC_URL:-http://localhost:8000}}

      # GraphQL Playground - disable in production
      GRAPHQL_PLAYGROUND_ENABLED: ${GRAPHQL_PLAYGROUND_ENABLED:-True}

      # Allow Docker internal IPs for webhooks (sync webhooks use Docker service names)
      HTTP_IP_FILTER_ENABLED: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saleor-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket, os; port = int(os.environ.get('SALEOR_API_PORT')); s = socket.socket(); s.settimeout(2); result = s.connect_ex(('127.0.0.1', port)); s.close(); exit(0 if result == 0 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 240s

  saleor-worker:
    # Use same build as API (local code)
    build:
      context: ../saleor
      dockerfile: Dockerfile
    container_name: saleor-worker-dev
    command: celery -A saleor.celeryconf:app worker --loglevel=info
    volumes:
      # Mount only source code (preserves installed packages)
      - ../saleor/saleor:/app/saleor
      - ../saleor/manage.py:/app/manage.py
      - saleor-media:/app/media
      # Mount custom plugins
      # Custom plugins go in saleor/plugins/custom/
      # - ../saleor/plugins/custom:/app/plugins/custom:ro
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      EMAIL_URL: ${EMAIL_URL}
      TIME_ZONE: ${TIME_ZONE}
      # Same RSA key as API so webhook JWS verification in apps succeeds
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY:-}
      RSA_PRIVATE_PASSWORD: ${RSA_PRIVATE_PASSWORD:-}
      DEBUG: ${DEBUG}
      PUBLIC_URL: ${SALEOR_API_TUNNEL_URL:-${PUBLIC_URL:-http://localhost:8000}}
      # Storefront URL for abandoned checkout recovery emails
      STOREFRONT_URL: ${STOREFRONT_URL:-${NEXT_PUBLIC_STOREFRONT_URL:-http://localhost:3000}}
      # Allow Docker internal IPs for webhooks
      HTTP_IP_FILTER_ENABLED: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    restart: unless-stopped

  saleor-scheduler:
    # Use same build as API (local code)
    build:
      context: ../saleor
      dockerfile: Dockerfile
    container_name: saleor-scheduler-dev
    command: celery -A saleor.celeryconf:app beat --loglevel=info
    volumes:
      # Mount local Saleor code
      - ../saleor:/app
      # Mount custom plugins
      # Custom plugins go in saleor/plugins/custom/
      # - ../saleor/plugins/custom:/app/plugins/custom:ro
    env_file:
      - .env
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      TIME_ZONE: ${TIME_ZONE}
      DEBUG: ${DEBUG}
      PUBLIC_URL: ${SALEOR_API_TUNNEL_URL:-${PUBLIC_URL:-http://localhost:8000}}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    restart: unless-stopped

  saleor-dashboard:
    # Use local Dashboard code - Vite dev server with HMR
    image: node:22-alpine
    container_name: saleor-dashboard-dev
    working_dir: /app
    # Dev server: faster startup, HMR support. Use 'pnpm build && pnpm preview' for production testing.
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --prefer-offline && pnpm run generate:main && pnpm build && pnpm preview --host 0.0.0.0 --port 9000"
    env_file:
      - .env
    ports:
      - "${DASHBOARD_PORT}:9000" # Vite preview port
    volumes:
      # Mount entire dashboard directory
      - ../dashboard:/app
      # Preserve node_modules
      - dashboard-node-modules:/app/node_modules
      # Cache pnpm store globally to avoid re-downloading packages
      - dashboard-pnpm-store:/root/.local/share/pnpm/store
    environment:
      # API URL for Dashboard GraphQL requests - All from .env
      API_URL: ${API_URL}
      VITE_API_URL: ${VITE_API_URL}
      APPS_MARKETPLACE_API_URL: ${APPS_MARKETPLACE_API_URL}
      DASHBOARD_TUNNEL_URL: ${DASHBOARD_TUNNEL_URL}
      EXTENSIONS_API_URL: ${EXTENSIONS_API_URL}
      APP_MOUNT_URI: ${APP_MOUNT_URI}
      STATIC_URL: ${STATIC_URL}
      NODE_ENV: ${NODE_ENV:-development}
      # Baked in at build time: set to "true" to disable React StrictMode (helps RichTextEditor/Combobox)
      VITE_DISABLE_STRICT_MODE: ${VITE_DISABLE_STRICT_MODE:-}
      # AI Assistant (set VITE_AI_ASSISTANT_ENABLED=true and VITE_AI_API_KEY in .env)
      VITE_AI_ASSISTANT_ENABLED: ${VITE_AI_ASSISTANT_ENABLED:-}
      VITE_AI_API_KEY: ${VITE_AI_API_KEY:-}
      VITE_AI_MODEL: ${VITE_AI_MODEL:-claude-haiku-4-5-20251001}
      # Store branding (used by AI assistant, baked at build time)
      VITE_STORE_NAME: ${VITE_STORE_NAME:-Aura}
      VITE_PLATFORM_NAME: ${VITE_PLATFORM_NAME:-Aura E-Commerce Platform}
    depends_on:
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:9000/dashboard/",
        ]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 360s

  saleor-storefront:
    # Use official Saleor Storefront (Next.js 15, React 19)
    image: node:22-alpine
    container_name: saleor-storefront-dev
    working_dir: /app
    # Install dependencies and start Next.js dev server OR production build
    # Set STOREFRONT_MODE=production in .env to use production build
    # Set STOREFRONT_MODE=dev (or leave unset) to use dev server
    # Generate GraphQL types before starting dev server or building
    # Codegen will use SALEOR_API_URL (Docker service name) for server-side operations
    # Only install if node_modules doesn't exist or package.json changed (pnpm handles this automatically)
    # Optionally generate storefront config fallback file if env vars are set
    # Uses tunnel URL if available (for tunneling setups), otherwise falls back to internal/public URLs
    command: sh -c "corepack enable && corepack prepare pnpm@9.6.0 --activate && unset NODE_ENV && pnpm install --prefer-offline && echo '🔍 Generating GraphQL types...' && pnpm run generate && if [ -f ../scripts/fetch-storefront-config.ts ] && [ -n \"$${SALEOR_API_URL}\" ] && [ -n \"$${STOREFRONT_CHANNELS}\" ]; then echo '🔍 Generating storefront config fallback (using tunnel URL if available)...' && cd .. && export STOREFRONT_CONTROL_APP_TUNNEL_URL=\"$${STOREFRONT_CONTROL_APP_TUNNEL_URL}\" && export STOREFRONT_CONTROL_APP_URL=\"$${STOREFRONT_CONTROL_APP_URL}\" && node scripts/fetch-storefront-config.ts || echo '⚠️  Config generation failed, continuing...' && cd storefront; fi && if [ \"$${STOREFRONT_MODE:-dev}\" = \"production\" ]; then echo '🔍 Building production...' && export NODE_ENV=production && pnpm run build && echo 'Starting production server...' && pnpm run start; else echo 'Starting dev server...' && export NODE_ENV=development && pnpm run dev; fi"
    env_file:
      - .env
    ports:
      - "${STOREFRONT_PORT}:3000" # Next.js default port
    volumes:
      # Mount entire storefront directory for hot-reload (dev) or source access (prod)
      - ../storefront:/app
      # Mount apps packages so tsconfig path aliases resolve (e.g. @saleor/apps-storefront-config)
      - ../apps:/apps:ro
      # Mount project root to access storefront-cms-config.json and scripts
      - ..:/workspace:ro
      # Preserve node_modules
      - storefront-node-modules:/app/node_modules
      # Preserve Next.js build cache
      - storefront-next-cache:/app/.next
      # Cache pnpm store globally to avoid re-downloading packages
      - storefront-pnpm-store:/root/.local/share/pnpm/store
    environment:
      # All URLs from .env file
      NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
      SALEOR_API_URL: ${SALEOR_API_URL}
      NEXT_PUBLIC_STOREFRONT_URL: ${NEXT_PUBLIC_STOREFRONT_URL}
      NEXT_PUBLIC_DEFAULT_CHANNEL: ${NEXT_PUBLIC_DEFAULT_CHANNEL:-}
      SALEOR_APP_TOKEN: ${SALEOR_APP_TOKEN:-}
      # Internal Docker network URL for invoices app (server-to-server)
      INVOICES_APP_INTERNAL_URL: http://saleor-invoice-app:3000
      # Public URL for invoices app (for client downloads)
      INVOICES_APP_URL: ${INVOICE_APP_URL}
      # Internal Docker network URL for storefront control app (server-to-server)
      STOREFRONT_CONTROL_APP_INTERNAL_URL: http://saleor-storefront-control-app:3000
      # Public URL for storefront control app (for client-side fetches)
      STOREFRONT_CONTROL_APP_URL: ${STOREFRONT_CONTROL_APP_URL}
      # Tunnel URL for storefront control app (prioritized for build-time fetching)
      STOREFRONT_CONTROL_APP_TUNNEL_URL: ${STOREFRONT_CONTROL_APP_TUNNEL_URL:-${STOREFRONT_CONTROL_APP_URL}}
      # Channels to fetch config for (comma-separated, e.g., "ils,usd,default")
      # Used by build script to generate fallback config file
      STOREFRONT_CHANNELS: ${STOREFRONT_CHANNELS:-ils,usd}
      # Storefront tunnel URL (for webhooks from storefront-control)
      STOREFRONT_TUNNEL_URL: ${STOREFRONT_TUNNEL_URL:-${NEXT_PUBLIC_STOREFRONT_URL}}
      # Newsletter app URL for unsubscribe API calls (use tunnel URL for external access)
      NEXT_PUBLIC_NEWSLETTER_APP_URL: ${NEWSLETTER_APP_TUNNEL_URL:-http://localhost:${NEWSLETTER_APP_PORT:-3005}}
      # SMTP app URL for sending welcome emails (use tunnel URL for external access)
      NEXT_PUBLIC_SMTP_APP_URL: ${SMTP_APP_TUNNEL_URL:-http://localhost:${SMTP_APP_PORT:-3001}}
      # Build mode: 'dev' (default) or 'production'
      # Set STOREFRONT_MODE=production in .env to use production build
      # Set STOREFRONT_MODE=dev (or leave unset) to use dev server
      # NODE_ENV is set dynamically in the command based on STOREFRONT_MODE
      STOREFRONT_MODE: ${STOREFRONT_MODE:-dev}
      # Next.js
      PORT: ${STOREFRONT_PORT}
      HOSTNAME: 0.0.0.0
      # Sentry error monitoring (set in .env or .env.self-hosted)
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    depends_on:
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:${STOREFRONT_PORT}",
        ]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 300s

  # SMTP App - Handles email notifications (fulfillment, invoices, etc.)
  # This app sends emails via SMTP when webhook events are triggered
  saleor-smtp-app:
    image: node:22-alpine
    container_name: saleor-smtp-app-dev
    working_dir: /app
    # APPS_MODE=production: build then start; APPS_MODE=dev (default): dev server
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --filter saleor-app-smtp... --prefer-offline && cd apps/smtp && if [ \"$${APPS_MODE:-dev}\" = \"production\" ]; then pnpm build && pnpm start; else pnpm dev; fi"
    env_file:
      - .env
    ports:
      - "${SMTP_APP_PORT:-3001}:3000"
    volumes:
      - ../apps:/app
      - smtp-app-node-modules:/app/node_modules
      - smtp-app-pnpm-store:/root/.local/share/pnpm/store
    environment:
      SALEOR_API_URL: ${SALEOR_API_URL}
      NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
      STRIPE_APP_URL: ${STRIPE_APP_URL}
      STRIPE_APP_API_BASE_URL: ${STRIPE_APP_API_BASE_URL}
      # SMTP App base URL for webhook registration (use tunnel URL for external access)
      APP_API_BASE_URL: ${SMTP_APP_TUNNEL_URL:-http://localhost:${SMTP_APP_PORT:-3001}}
      APP_IFRAME_BASE_URL: ${SMTP_APP_TUNNEL_URL:-http://localhost:${SMTP_APP_PORT:-3001}}
      NODE_ENV: ${NODE_ENV:-development}
      # Secret key for encrypting app metadata - MUST match Newsletter app
      SECRET_KEY: ${APP_SECRET_KEY}
      # Storefront Control URL for fetching branding (Docker internal)
      STOREFRONT_CONTROL_APP_INTERNAL_URL: http://saleor-storefront-control-app:3000
      # Fallback store branding (used if Storefront Control unreachable)
      STORE_NAME: ${STORE_NAME:-Your Store}
      STORE_EMAIL: ${STORE_EMAIL:-support@yourstore.com}
      STOREFRONT_URL: ${STOREFRONT_URL:-http://localhost:3000}
      # Disable OpenTelemetry/Sentry in development
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # Set APPS_MODE=production in .env to run production build in container
      APPS_MODE: ${APPS_MODE:-dev}
    depends_on:
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Invoice App - Generates PDF invoices for orders
  saleor-invoice-app:
    image: node:22-alpine
    container_name: saleor-invoice-app-dev
    working_dir: /app
    # APPS_MODE=production: build then start; APPS_MODE=dev (default): dev server
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --filter saleor-app-invoices... --prefer-offline && cd apps/invoices && if [ \"$${APPS_MODE:-dev}\" = \"production\" ]; then pnpm run generate && pnpm build && pnpm start; else pnpm dev; fi"
    env_file:
      - .env
    ports:
      - "${INVOICE_APP_PORT:-3003}:3000"
    volumes:
      - ../apps:/app
      - invoice-app-node-modules:/app/node_modules
      - invoice-app-pnpm-store:/root/.local/share/pnpm/store
    environment:
      SALEOR_API_URL: ${SALEOR_API_URL}
      NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
      INVOICE_APP_URL: ${INVOICE_APP_URL}
      INVOICE_APP_API_BASE_URL: ${INVOICE_APP_API_BASE_URL}
      APP_API_BASE_URL: ${INVOICE_APP_URL}
      # Storefront Control URL for fetching branding (Docker internal)
      STOREFRONT_CONTROL_APP_INTERNAL_URL: http://saleor-storefront-control-app:3000
      # Fallback store branding (used if Storefront Control unreachable)
      STORE_NAME: ${STORE_NAME:-Your Store}
      STORE_EMAIL: ${STORE_EMAIL:-support@yourstore.com}
      STOREFRONT_URL: ${STOREFRONT_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
      # Disable OpenTelemetry/Sentry in development
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      # Set APPS_MODE=production in .env to run production build in container
      APPS_MODE: ${APPS_MODE:-dev}
    depends_on:
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Stripe App - Saleor Payment App for Stripe
  # First, clone the apps repo: git clone https://github.com/saleor/apps.git (in parent directory)
  # Then create a Saleor App in Dashboard and get the App Token
  saleor-stripe-app:
    # Use Node.js image (same as storefront/dashboard) - no Dockerfile needed
    image: node:22-alpine
    container_name: saleor-stripe-app-dev
    working_dir: /app
    # APPS_MODE=production: build then start; APPS_MODE=dev (default): dev server
    # Must install from monorepo root to get catalog entries and workspace dependencies
    command: sh -c "corepack enable && corepack prepare pnpm@10 --activate && pnpm install --filter saleor-app-payment-stripe... --prefer-offline && cd apps/stripe && if [ \"$${APPS_MODE:-dev}\" = \"production\" ]; then pnpm build && pnpm start; else pnpm dev; fi"
    env_file:
      - .env
    ports:
      - "${STRIPE_APP_PORT}:3000" # Different port from storefront (3000) and dashboard (9000)
    volumes:
      # Mount entire apps repository (monorepo root) for catalog support
      # Apps folder is now inside saleor-platform directory
      # Using absolute Windows path (forward slashes work in Docker on Windows)
      # Note: Update this path if your saleor-platform is in a different location
      # Alternative: Use relative path if running from infra/ directory: ../apps:/app
      - ../apps:/app
      # Preserve node_modules at root level (monorepo structure)
      - stripe-app-node-modules:/app/node_modules
      # Preserve Next.js build cache
      - stripe-app-next-cache:/app/apps/stripe/.next
      # Cache pnpm store globally to avoid re-downloading packages
      - stripe-app-pnpm-store:/root/.local/share/pnpm/store
    environment:
      # All configuration from .env file
      # Stripe app uses same API URLs as storefront
      SALEOR_API_URL: ${SALEOR_API_URL}
      NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL}
      SALEOR_APP_TOKEN: ${STRIPE_APP_TOKEN}

      # Stripe API keys - From .env
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      # App configuration
      APP_ID: stripe
      APP_NAME: Stripe
      APP_ENV: ${NODE_ENV:-development}
      APP_URL: ${STRIPE_APP_URL}
      APP_API_BASE_URL: ${STRIPE_APP_API_BASE_URL}
      NODE_ENV: ${NODE_ENV:-development}

      # App Encryption Key - From .env
      SECRET_KEY: ${APP_SECRET_KEY}
      MANIFEST_APP_ID: stripe

      # PostgreSQL connection - From .env
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/stripe_app

      # Disable instrumentation features in development to avoid errors
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}

      # Next.js
      PORT: 3000
      HOSTNAME: 0.0.0.0
      # Set APPS_MODE=production in .env to run production build in container
      APPS_MODE: ${APPS_MODE:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      saleor-api:
        condition: service_healthy
    networks:
      - saleor-network
    restart: unless-stopped

  # Storefront Control App - Dashboard extension for managing storefront UI configuration
  # Manages: theme, features, homepage sections, filters, quickFilters, SEO per channel
  saleor-storefront-control-app:
    image: node:22-alpine
    container_name: saleor-storefront-control-app-dev
    working_dir: /app
