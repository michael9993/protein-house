      NODE_ENV: ${NODE_ENV:-development}

      # App Encryption Key - From .env
      SECRET_KEY: ${APP_SECRET_KEY}
      MANIFEST_APP_ID: saleor.app.payment.paypal

      # PostgresAPL — uses same DB as Saleor (auth_data table is app-specific)
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-saleor}

      # Disable instrumentation features in development
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}

