# ============================================================================
# Aura E-Commerce Platform — Service Registry
# ============================================================================
# Single source of truth for all services, ports, containers, and tunnels.
# Used by platform.ps1 and all infra scripts.
# ============================================================================

platform:
  name: "Pawzen E-Commerce"
  domain: "pawzenpets.shop"
  tunnel_name: "pawzen-platform"

backup:
  directory: "~/saleor-backups"
  retain: 30
  compress: true

store:
  name: "Pawzen"
  slug: "pawzen"
  tagline: "Premium Pet Care & Accessories"
  type: "physical"
  email: "support@pawzenpets.shop"
  phone: ""
  address:
    street: ""
    city: ""
    country: "Israel"
  colors:
    primary: "#1B2838"
    secondary: "#1E4D3A"
    accent: "#C9A962"
  analytics:
    gtm_id: "GTM-PWN35T2R"
    ga4_id: "G-1X96SJX4SP"

services:
  api:
    port: 8000
    container: "saleor-api-dev"
    compose_service: "saleor-api"
    subdomain: "api"
    health_path: "/graphql/"
    health_check: true
    tunnel_env_var: "SALEOR_API_TUNNEL_URL"
    description: "Saleor GraphQL API"

  dashboard:
    port: 9000
    container: "saleor-dashboard-dev"
    compose_service: "saleor-dashboard"
    subdomain: "dash"
    health_path: "/"
    tunnel_env_var: "DASHBOARD_TUNNEL_URL"
    description: "Admin Dashboard"

  storefront:
    port: 3000
    container: "saleor-storefront-dev"
    compose_service: "saleor-storefront"
    subdomain: "shop"
    health_path: "/"
    tunnel_env_var: "STOREFRONT_TUNNEL_URL"
    description: "Customer Storefront"

  worker:
    container: "saleor-worker-dev"
    compose_service: "saleor-worker"
    description: "Celery background worker"

  scheduler:
    container: "saleor-scheduler-dev"
    compose_service: "saleor-scheduler"
    description: "Celery beat scheduler"

  postgres:
    port: 5432
    container: "saleor-postgres-dev"
    compose_service: "postgres"
    health_check: true
    description: "PostgreSQL database"

  redis:
    port: 6379
    container: "saleor-redis-dev"
    compose_service: "redis"
    health_check: true
    description: "Redis cache/broker"

  stripe:
    port: 3002
    container: "saleor-stripe-app-dev"
    compose_service: "saleor-stripe-app"
    subdomain: "stripe"
    tunnel_env_var: "STRIPE_APP_TUNNEL_URL"
    app_id: "stripe"
    app_manifest_path: "/api/manifest"
    permissions:
      - "HANDLE_PAYMENTS"
    description: "Stripe Payment App"

  smtp:
    port: 3001
    container: "saleor-smtp-app-dev"
    compose_service: "saleor-smtp-app"
    subdomain: "smtp"
    tunnel_env_var: "SMTP_APP_TUNNEL_URL"
    app_id: "saleor.app.smtp"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_ORDERS"
      - "MANAGE_USERS"
      - "MANAGE_GIFT_CARD"
    description: "SMTP Email App"

  invoices:
    port: 3003
    container: "saleor-invoice-app-dev"
    compose_service: "saleor-invoice-app"
    subdomain: "invoices"
    tunnel_env_var: "INVOICE_APP_TUNNEL_URL"
    app_id: "saleor.app.invoices"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_ORDERS"
    description: "PDF Invoice App"

  control:
    port: 3004
    container: "saleor-storefront-control-app-dev"
    compose_service: "saleor-storefront-control-app"
    subdomain: "control"
    tunnel_env_var: "STOREFRONT_CONTROL_APP_TUNNEL_URL"
    app_id: "saleor.app.storefront-control"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_APPS"
      - "MANAGE_DISCOUNTS"
    description: "Storefront Control CMS App"

  newsletter:
    port: 3005
    container: "saleor-newsletter-app-dev"
    compose_service: "saleor-newsletter-app"
    subdomain: "newsletter"
    tunnel_env_var: "NEWSLETTER_APP_TUNNEL_URL"
    app_id: "saleor.app.newsletter"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_APPS"
      - "MANAGE_USERS"
    description: "Newsletter App"

  analytics:
    port: 3006
    container: "saleor-sales-analytics-app-dev"
    compose_service: "saleor-sales-analytics-app"
    subdomain: "analytics"
    tunnel_env_var: "SALES_ANALYTICS_APP_TUNNEL_URL"
    app_id: "saleor.app.sales-analytics"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_ORDERS"
      - "MANAGE_PRODUCTS"
      - "MANAGE_CHANNELS"
    description: "Sales Analytics App"

  bulk:
    port: 3007
    container: "saleor-bulk-manager-app-dev"
    compose_service: "saleor-bulk-manager-app"
    subdomain: "bulk"
    tunnel_env_var: "BULK_MANAGER_APP_TUNNEL_URL"
    app_id: "saleor.app.bulk-manager"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_PRODUCTS"
      - "MANAGE_ORDERS"
      - "MANAGE_USERS"
      - "MANAGE_APPS"
      - "MANAGE_DISCOUNTS"
      - "MANAGE_GIFT_CARD"
      - "MANAGE_PRODUCT_TYPES_AND_ATTRIBUTES"
      - "MANAGE_PAGES"
      - "MANAGE_PAGE_TYPES_AND_ATTRIBUTES"
      - "MANAGE_TRANSLATIONS"
    description: "Bulk Import/Export Manager"

  studio:
    port: 3008
    container: "saleor-image-studio-app-dev"
    compose_service: "saleor-image-studio-app"
    subdomain: "studio"
    tunnel_env_var: "IMAGE_STUDIO_APP_TUNNEL_URL"
    app_id: "saleor.app.image-studio"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_PRODUCTS"
      - "MANAGE_APPS"
    description: "AI Image Studio App"

  dropship:
    port: 3009
    container: "saleor-dropship-app-dev"
    compose_service: "saleor-dropship-app"
    subdomain: "dropship"
    tunnel_env_var: "DROPSHIP_APP_TUNNEL_URL"
    app_id: "saleor.app.dropship-orchestrator"
    app_manifest_path: "/api/manifest"
    permissions:
      - "MANAGE_PRODUCTS"
      - "MANAGE_PRODUCT_TYPES_AND_ATTRIBUTES"
      - "MANAGE_ORDERS"
      - "MANAGE_APPS"
      - "MANAGE_SHIPPING"
      - "MANAGE_CHECKOUTS"
      - "MANAGE_CHANNELS"
    description: "Dropship Orchestrator App"

  tax:
    port: 3010
    container: "saleor-tax-manager-app-dev"
    compose_service: "saleor-tax-manager-app"
    subdomain: "tax"
    tunnel_env_var: "TAX_MANAGER_APP_TUNNEL_URL"
    app_id: "saleor.app.tax-manager"
    app_manifest_path: "/api/manifest"
    permissions:
      - "HANDLE_TAXES"
      - "MANAGE_APPS"
    description: "Tax Manager App"

  paypal:
    port: 3011
    container: "saleor-paypal-app-dev"
    compose_service: "saleor-paypal-app"
    subdomain: "ext1"
    tunnel_env_var: "PAYPAL_APP_TUNNEL_URL"
    app_id: "saleor.app.payment.paypal"
    app_manifest_path: "/api/manifest"
    permissions:
      - "HANDLE_PAYMENTS"
      - "MANAGE_ORDERS"
    description: "PayPal Payment App"
