# --- Warehouses ---
# Maps to stock:Main Warehouse and stock:International Warehouse columns in the product Excel.

warehouses:
  - name: "Main Warehouse"
    slug: main-warehouse
    address:
      streetAddress1: "Industrial Zone"
      city: "Sakhnin"
      countryArea: "North District"
      postalCode: "20173"
      country: IL
    shippingZones:
      - "Israel Domestic"
  - name: "International Warehouse"
    slug: international-warehouse
    address:
      streetAddress1: "123 Commerce Blvd"
      city: "New York"
      countryArea: "NY"
      postalCode: "10001"
      country: US
    shippingZones:
      - "International"

# --- Shipping Zones ---

shippingZones:
  - name: "Israel Domestic"
    countries:
      - IL
    channels:
      - ils
    shippingMethods:
      - name: "Standard Delivery"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: ils
            price: 29.90
            minimumOrderPrice: 0
      - name: "Express Delivery"
        type: PRICE
        minimumDeliveryDays: 1
        maximumDeliveryDays: 3
        channelListings:
          - channel: ils
            price: 49.90
            minimumOrderPrice: 0
      - name: "Free Shipping"
        type: PRICE
        minimumDeliveryDays: 5
        maximumDeliveryDays: 10
        channelListings:
          - channel: ils
            price: 0
            minimumOrderPrice: 299
  - name: "International"
    countries:
      - US
      - GB
      - DE
      - FR
      - CA
      - AU
    channels:
      - usd
    shippingMethods:
      - name: "Standard International"
        type: PRICE
        minimumDeliveryDays: 7
        maximumDeliveryDays: 14
        channelListings:
          - channel: usd
            price: 14.99
            minimumOrderPrice: 0
      - name: "Express International"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: usd
            price: 29.99
            minimumOrderPrice: 0
      - name: "Free International Shipping"
        type: PRICE
        minimumDeliveryDays: 10
        maximumDeliveryDays: 21
        channelListings:
          - channel: usd
            price: 0
            minimumOrderPrice: 150
