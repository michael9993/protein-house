# --- Warehouses ---
# Maps to stock:Pawzen Israel Warehouse and stock:Pawzen International Warehouse columns in the product Excel.

warehouses:
  - name: "Pawzen Israel Warehouse"
    slug: pawzen-israel-warehouse
    address:
      streetAddress1: "Industrial Zone"
      city: "Sakhnin"
      countryArea: "North District"
      postalCode: "20173"
      country: IL
    shippingZones:
      - "Israel Domestic"
  - name: "Pawzen International Warehouse"
    slug: pawzen-international-warehouse
    address:
      streetAddress1: "123 Commerce Blvd"
      city: "New York"
      countryArea: "NY"
      postalCode: "10001"
      country: US
    shippingZones:
      - "International"

# --- Shipping Zones ---

shippingZones:
  - name: "Israel Domestic"
    countries:
      - IL
    channels:
      - ils
    shippingMethods:
      - name: "Standard Delivery"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: ils
            price: 19.90
            minimumOrderPrice: 0
      - name: "Express Delivery"
        type: PRICE
        minimumDeliveryDays: 1
        maximumDeliveryDays: 3
        channelListings:
          - channel: ils
            price: 39.90
            minimumOrderPrice: 0
      - name: "Free Shipping"
        type: PRICE
        minimumDeliveryDays: 5
        maximumDeliveryDays: 10
        channelListings:
          - channel: ils
            price: 0
            minimumOrderPrice: 200
  - name: "International"
    countries:
      - US
      - GB
      - DE
      - FR
      - CA
      - AU
    channels:
      - usd
    shippingMethods:
      - name: "Standard International"
        type: PRICE
        minimumDeliveryDays: 7
        maximumDeliveryDays: 15
        channelListings:
          - channel: usd
            price: 9.99
            minimumOrderPrice: 0
      - name: "Express International"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: usd
            price: 24.99
            minimumOrderPrice: 0
      - name: "Free International Shipping"
        type: PRICE
        minimumDeliveryDays: 10
        maximumDeliveryDays: 21
        channelListings:
          - channel: usd
            price: 0
            minimumOrderPrice: 75
