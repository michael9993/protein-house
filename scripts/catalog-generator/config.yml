# --- Warehouses ---
# Maps to stock columns in the product Excel.

warehouses:
  - name: "Protein House Israel"
    slug: protein-israel
    address:
      streetAddress1: "Industrial Zone"
      city: "Haifa"
      country: IL
    shippingZones:
      - "Israel Domestic"
  - name: "International Warehouse"
    slug: protein-intl
    address:
      streetAddress1: "Logistics Center"
      city: "New York"
      country: US
    shippingZones:
      - "International"

# --- Shipping Zones ---

shippingZones:
  - name: "Israel Domestic"
    countries:
      - IL
    channels:
      - ils
    shippingMethods:
      - name: "Standard Delivery"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 5
        channelListings:
          - channel: ils
            price: 29.90
            minimumOrderPrice: 0
      - name: "Express Delivery"
        type: PRICE
        minimumDeliveryDays: 1
        maximumDeliveryDays: 2
        channelListings:
          - channel: ils
            price: 49.90
            minimumOrderPrice: 0
      - name: "Free Shipping"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 7
        channelListings:
          - channel: ils
            price: 0
            minimumOrderPrice: 200
  - name: "International"
    countries:
      - US
    channels:
      - usd
    shippingMethods:
      - name: "Standard International"
        type: PRICE
        minimumDeliveryDays: 7
        maximumDeliveryDays: 14
        channelListings:
          - channel: usd
            price: 9.99
            minimumOrderPrice: 0
      - name: "Express International"
        type: PRICE
        minimumDeliveryDays: 3
        maximumDeliveryDays: 5
        channelListings:
          - channel: usd
            price: 24.99
            minimumOrderPrice: 0
      - name: "Free International Shipping"
        type: PRICE
        minimumDeliveryDays: 10
        maximumDeliveryDays: 21
        channelListings:
          - channel: usd
            price: 0
            minimumOrderPrice: 75
