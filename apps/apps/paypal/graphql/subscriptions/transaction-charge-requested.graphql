fragment TransactionChargeRequestedEvent on TransactionChargeRequested {
  ...EventMetadata
  action {
    amount
  }
  transaction {
    id
    pspReference
    order {
      id
      channel {
        ...Channel
      }
    }
  }
}

subscription TransactionChargeRequested {
  event {
    ...TransactionChargeRequestedEvent
  }
}
