fragment OrderAnalytics on Order {
  id
  number
  created
  status
  chargeStatus
  paymentStatus
  paymentStatusDisplay
  totalRefunded {
    ...Money
  }
  totalGrantedRefund {
    ...Money
  }
  grantedRefunds {
    id
    amount {
      ...Money
    }
    reason
    status
  }
  total {
    gross {
      ...Money
    }
    net {
      ...Money
    }
  }
  shippingPrice {
    gross {
      ...Money
    }
  }
  discounts {
    id
    type
    name
    amount {
      ...Money
    }
  }
  channel {
    slug
    name
    currencyCode
  }
  lines {
    id
    productName
    productSku
    quantity
    totalPrice {
      gross {
        ...Money
      }
    }
    unitDiscount {
      ...Money
    }
    variant {
      channelListings {
        costPrice {
          ...Money
        }
        channel {
          slug
        }
      }
      product {
        id
        name
        category {
          id
          name
        }
        metadata {
          key
          value
        }
        privateMetadata {
          key
          value
        }
      }
    }
  }
  user {
    id
    email
  }
}
